  <g font-family="Inter, Arial, sans-serif">
    <text x="155" y="154" font-size="30" font-weight="800" fill="#111827"># 2026-05-15 Daily Reflection</text>

    <text x="155" y="208" font-size="21" font-weight="750" fill="#111827">## Raw Record</text>
    <text x="185" y="242" font-size="17" fill="#374151">Today included shipping an API PR, coffee with a teammate, a long lunch walk,</text>
    <text x="185" y="268" font-size="17" fill="#374151">tooling issues, budget review, and notes for tomorrow's follow-up.</text>

    <text x="155" y="326" font-size="21" font-weight="750" fill="#111827">## Daily Overview</text>
    <text x="185" y="360" font-size="17" fill="#374151">- Productive workday with meaningful delivery progress.</text>
    <text x="185" y="386" font-size="17" fill="#374151">- Energy was lower in the morning but recovered through focused execution.</text>
    <text x="185" y="412" font-size="17" fill="#374151">- Several small frictions became useful signals for future workflow design.</text>

    <text x="155" y="470" font-size="21" font-weight="750" fill="#111827">## State Analysis</text>
    <text x="185" y="504" font-size="17" fill="#374151">### Emotional State</text>
    <text x="215" y="530" font-size="17" fill="#374151">- Tired but still moving; positive feedback helped stabilize the day.</text>
    <text x="185" y="566" font-size="17" fill="#374151">### Work State</text>
    <text x="215" y="592" font-size="17" fill="#374151">- Good delivery momentum, with review and follow-up work clearly identified.</text>

    <rect x="730" y="188" width="370" height="310" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
    <text x="755" y="226" font-size="20" font-weight="750" fill="#111827">## Convertible Actions</text>
    <text x="775" y="264" font-size="16" fill="#374151">- Follow up on code review.</text>
    <text x="775" y="292" font-size="16" fill="#374151">- Review tooling cost and budget.</text>
    <text x="775" y="320" font-size="16" fill="#374151">- Confirm next steps before publishing.</text>

    <text x="755" y="372" font-size="20" font-weight="750" fill="#111827">## Archive-Ready Summary</text>
    <text x="775" y="410" font-size="16" fill="#374151">A concise version is generated for storage</text>
    <text x="775" y="438" font-size="16" fill="#374151">after the user reviews and approves it.</text>

    <rect x="730" y="530" width="370" height="54" rx="10" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="755" y="563" font-size="17" font-weight="700" fill="#166534">Publish only after confirmation</text>
