<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Daily Reflection Publisher Preview</title>
  <desc id="desc">Preview of a daily reflection generated from raw notes, with language mode and GitHub publishing confirmation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1d2939" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="74" y="58" width="1132" height="604" rx="18" fill="#ffffff"/>
  </g>

  <rect x="74" y="58" width="1132" height="54" rx="18" fill="#1f2937"/>
  <circle cx="109" cy="85" r="7" fill="#ef4444"/>
  <circle cx="134" cy="85" r="7" fill="#f59e0b"/>
  <circle cx="159" cy="85" r="7" fill="#22c55e"/>
  <text x="190" y="91" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f9fafb">Daily Reflection Publisher</text>

  <rect x="104" y="142" width="326" height="470" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="128" y="180" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Raw notes</text>
  <text x="128" y="220" font-family="Inter, Arial, sans-serif" font-size="18" fill="#374151">- Morning standup ran long</text>
  <text x="128" y="252" font-family="Inter, Arial, sans-serif" font-size="18" fill="#374151">- Shipped the API PR</text>
  <text x="128" y="284" font-family="Inter, Arial, sans-serif" font-size="18" fill="#374151">- Coffee with teammate</text>
  <text x="128" y="316" font-family="Inter, Arial, sans-serif" font-size="18" fill="#374151">- Need to review budget</text>
  <text x="128" y="348" font-family="Inter, Arial, sans-serif" font-size="18" fill="#374151">- Tired but focused</text>

  <rect x="128" y="408" width="258" height="52" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="148" y="440" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#155e75">Language: English</text>

  <rect x="128" y="478" width="258" height="52" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="148" y="510" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#166534">Publish after approval</text>

  <path d="M464 376 L536 376" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M520 358 L538 376 L520 394" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="568" y="142" width="584" height="470" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="600" y="180" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">2026-05-15 Daily Reflection</text>
  <line x1="600" y1="202" x2="1120" y2="202" stroke="#e5e7eb"/>

  <text x="600" y="242" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Daily Overview</text>
  <text x="620" y="274" font-family="Inter, Arial, sans-serif" font-size="17" fill="#374151">• Productive workday with meaningful delivery progress.</text>
  <text x="620" y="302" font-family="Inter, Arial, sans-serif" font-size="17" fill="#374151">• Energy was lower, but focus recovered in the afternoon.</text>

  <text x="600" y="352" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">State Analysis</text>
  <rect x="600" y="374" width="160" height="42" rx="8" fill="#eef2ff"/>
  <text x="622" y="401" font-family="Inter, Arial, sans-serif" font-size="16" fill="#3730a3">Emotional</text>
  <rect x="778" y="374" width="132" height="42" rx="8" fill="#ecfdf5"/>
  <text x="810" y="401" font-family="Inter, Arial, sans-serif" font-size="16" fill="#166534">Work</text>
  <rect x="928" y="374" width="158" height="42" rx="8" fill="#fff7ed"/>
  <text x="952" y="401" font-family="Inter, Arial, sans-serif" font-size="16" fill="#9a3412">Relationships</text>

  <text x="600" y="462" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Actions</text>
  <text x="620" y="494" font-family="Inter, Arial, sans-serif" font-size="17" fill="#374151">• Follow up on code review.</text>
  <text x="620" y="522" font-family="Inter, Arial, sans-serif" font-size="17" fill="#374151">• Track budget and tool usage.</text>
  <text x="620" y="550" font-family="Inter, Arial, sans-serif" font-size="17" fill="#374151">• Publish to GitHub after confirmation.</text>
</svg>
